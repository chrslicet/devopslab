# Maven Build and Deploy to Azure Web App
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Maven Build Stage'
  jobs:
  - job: Build
    displayName: 'Build Java App'
    steps:
    - task: Maven@3
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'demo/pom.xml'
        goals: 'clean package'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.21'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

    - task: CopyFiles@2
      displayName: 'Copy JAR to Staging'
      inputs:
        SourceFolder: 'demo/target'
        Contents: '*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToAzure
    displayName: 'Deploy to Web App'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            displayName: 'Download Artifact'
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy to devopslab'
            inputs:
              azureSubscription: 'azure-devopslab-connection'
              appType: 'webAppLinux'
              appName: 'devopslab'
              package: '$(Pipeline.Workspace)/drop/*.jar'